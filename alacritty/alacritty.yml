# WINDOW
window:
  dimensions:
    columns: 140
    lines: 40
  padding:
    x: 10
    y: 10
  decorations: full
  opacity: .9

#SCROLLING
scrolling:
  history: 10000
  multiplier: 3

# FONTS
font:
  normal:
    family: RobotoMono Nerd Font Mono
  bold:
    family: RobotoMono Nerd Font Mono
    style: Bold
  italic:
    family: RobotoMono Nerd Font Mono
    style: Italic
  size: 11.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

# Colors (One Half Dark)
colors:
  primary:
    background: '0x000000'
    foreground: '0xfbf1c7'

  normal:
    black: '0x282c34'
    red: '0xe06c75'
    green: '0x98c379'
    yellow: '0xe5c07b'
    blue: '0x61afef'
    magenta: '0xc678dd'
    cyan: '0x56b6c2'
    white: '0xdcdfe4'

  bright:
    black: '0x282c34'
    red: '0xe06c75'
    green: '0x98c379'
    yellow: '0xe5c07b'
    blue: '0x61afef'
    magenta: '0xc678dd'
    cyan: '0x56b6c2'
    white: '0xdcdfe4'

draw_bold_text_with_bright_colors: true

cursor:
  style:
    shape: Block
    blinking: Off
  unfocused_hollow: true
